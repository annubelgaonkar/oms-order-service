server:
  port: 8084

spring:
  application:
    name: oms-order-service

  datasource:
    url: jdbc:postgresql://postgres-order:5432/oms_order_db
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
      sqs:
        endpoint: http://localstack:4566

services:
  product:
    url: http://oms-product-service:8082
  inventory:
    url: http://oms-inventory-service:8083



sqs:
  order-created-queue: order-created-queue

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans